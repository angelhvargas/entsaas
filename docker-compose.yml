services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: entsaas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret-db-password}
      POSTGRES_DB: entsaas
      PGDATA: /var/lib/postgresql/18/docker
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
      - -c
      - log_min_duration_statement=200
      - -c
      - shared_buffers=128MB
      - -c
      - work_mem=8MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./deploy/init_db_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entsaas -d entsaas"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always

  redis:
    image: redis:7-alpine
    profiles: ["dev"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Development ──────────────────────────────────────────────────────────────
  api-dev:
    build:
      context: .
      target: backend-builder
    command: ./api
    ports:
      - "8080:8080"
    environment:
      - ENTSAAS_DEV=1
      - DATABASE_URL=postgres://entsaas:${POSTGRES_PASSWORD:-secret-db-password}@postgres:5432/entsaas?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-00000000000000000000000000000001}
      - ENTSAAS_MASTER_KEY=${ENTSAAS_MASTER_KEY:-000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f}
      - PORT=8080
      - LOG_LEVEL=debug
      - FF_REGISTRATION_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  web-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    environment:
      - API_TARGET=http://api-dev:8080
    depends_on:
      - api-dev
    profiles:
      - dev

volumes:
  web_node_modules:
  postgres_data:
