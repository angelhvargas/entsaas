# nginx.conf — VitePress static site serving
# SPA fallback, security headers, and cache control for docs.entsaas.com

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Disable server version disclosure
    server_tokens off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — long cache (VitePress hashes filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # YAML files (API spec) — short cache
    location ~* \.yaml$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # HTML pages — no cache (SPA navigation)
    location / {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ $uri.html /404.html =404;
    }

    # Health probe for Kubernetes readiness/liveness
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Block dotfile access
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
