openapi: 3.1.0
info:
  title: EntSaaS Public API
  description: Public REST API reference for the EntSaaS Multi-Tenant Framework.
  version: 1.0.0
servers:
  - url: http://localhost:8080/v1
    description: Local development server
paths:
  /auth/register:
    post:
      summary: Register a new user and organization
      operationId: registerUser
      tags:
        - Authentication
      x-exposure: public-ga
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                org_name:
                  type: string
              required:
                - email
                - password
                - org_name
      responses:
        '201':
          description: User and organization created successfully.
        '400':
          description: Malformed body or user already exists.
  /auth/login:
    post:
      summary: Authenticate a user and receive JWT tokens
      operationId: loginUser
      tags:
        - Authentication
      x-exposure: public-ga
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Login successful. Returns access and refresh tokens.
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  refresh_token:
                    type: string
        '401':
          description: Invalid email or password.
  /auth/me:
    get:
      summary: Retrieve the active user and organization profile
      operationId: getProfile
      tags:
        - Authentication
      x-exposure: public-ga
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success. Returns profile details.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      email:
                        type: string
                      role:
                        type: string
                        enum:
                          - owner
                          - admin
                          - member
                          - viewer
                  org:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
  /projects:
    get:
      summary: List all projects under the active organization
      operationId: listProjects
      tags:
        - Projects
      x-exposure: public-preview
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Success. Returns an array of projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    name:
                      type: string
                    status:
                      type: string
                      enum:
                        - active
                        - paused
                        - archived
                    created_at:
                      type: string
                      format: date-time
    post:
      summary: Create a new project workspace
      operationId: createProject
      tags:
        - Projects
      x-exposure: public-preview
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        '201':
          description: Project created successfully.
        '403':
          description: Limit exceeded for current subscription plan.
  /ai/chat:
    post:
      summary: Streaming SSE Chat Completion with LLM Providers
      operationId: aiChatStream
      tags:
        - AI Integration
      x-exposure: public-preview
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
              required:
                - prompt
      responses:
        '200':
          description: Success. Renders dynamic Server-Sent Events (SSE).
          content:
            text/event-stream:
              schema:
                type: string
        '403':
          description: AI access gate blocked on current subscription plan.
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
