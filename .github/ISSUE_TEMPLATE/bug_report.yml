---
name: "🐛 Bug Report"
description: "Report unexpected behavior in the EntSaaS framework"
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

  - type: input
    id: version
    attributes:
      label: EntSaaS version
      placeholder: "e.g. v0.2.0 or commit SHA"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `make dev-up`
        2. POST /v1/auth/login with ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 15.4
        - Go: 1.26.3
        - Node: 22.x
        - Docker: 27.x
